<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spotify 本機工具</title>

    <!-- Bootstrap 5.0.2 CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    />

    <!-- DataTables jQuery 版 (v1.13.x) + Bootstrap 5 佈景 -->
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
    />

    <!-- AG Grid 社群版（Alpine 主題） -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">


    <style>
      body { padding: 16px; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .small { font-size: 12px; }
      .w-100 { width: 100%; }

      /* ====== Split.js 三面板容器 ====== */
      #tripanel {
        display: flex;
        align-items: stretch;
        gap: 12px;           /* 讓面板與分隔線之間有間距（視覺更清楚） */
        min-height: 60vh;    /* 給個合理的工作高度 */
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-width: 180px;    /* 避免過窄 */
      }
      .panel .card { height: 100%; }

      /* Split.js 自動產生的分隔線樣式（水平分隔） */
      .gutter.gutter-horizontal {
        flex: 0 0 auto;
        width: 8px;
        cursor: col-resize;
        border-radius: 4px;
        background: repeating-linear-gradient(
          90deg,
          #ddd 0, #ddd 2px,
          #eee 2px, #eee 4px
        );
      }
      .gutter.gutter-horizontal:hover { background: #e1e7ea; }
      .gutter.gutter-horizontal:active { background: #cfd8dc; }

      /* 手機寬度時：改為直向堆疊（此時 Split.js 仍可用，但拖曳以寬/高適配為主） */
      @media (max-width: 991.98px) {
        #tripanel { flex-direction: column; }
        .panel { min-height: 220px; }
        .gutter.gutter-horizontal {
          height: 8px;
          width: 100%;
          cursor: row-resize;
        }
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <!-- Header -->
      <div class="d-flex align-items-center mb-3">
        <h3 class="me-auto">Spotify 本機工具</h3>
        <button id="btn-login" class="btn btn-success me-2">登入 Spotify</button>
        <button id="btn-refresh-pl" class="btn btn-outline-secondary">刷新播放清單</button>
      </div>

      <hr class="my-3" />
      <div class="card">
        <div class="card-body">
          <div class="d-flex align-items-center mb-2">
            <div class="me-auto fw-bold">AG Grid Demo（已按讚清單）</div>
            <input id="gridQuick" class="form-control form-control-sm" placeholder="快速搜尋（全欄位）" style="width: 220px;">
            <button id="gridReset" class="btn btn-outline-secondary btn-sm ms-2">重置篩選</button>
          </div>
          <div id="agLikedDemo" class="ag-theme-alpine" style="height:520px"></div>
        </div>
      </div>




      <!-- 🔧 三面板（Split.js 會自動產生分隔線） -->
      <div id="tripanel">
        <!-- 播放清單清單（選取用） -->
        <section id="panel-playlists" class="panel">
          <div class="card h-100">
            <div class="card-body">
              <h5 class="mb-2">播放清單</h5>
              <ul id="pl-list" class="list-group small"></ul>
            </div>
          </div>
        </section>

        <!-- 左半：選取的播放清單 -->
        <section id="panel-selected" class="panel">
          <div class="card h-100">
            <div class="card-body">
              <div class="d-flex align-items-center mb-2">
                <div id="pl-title" class="me-auto fw-bold">尚未選取</div>
                <button id="btn-reload-pl-tracks" class="btn btn-outline-secondary btn-sm">
                  重載曲目
                </button>
              </div>

              <div class="mb-3">
                <div class="row g-2">
                  <div class="col-md">
                    <label class="form-label">
                      輸入要新增或移除的 Track（URL / URI / ID），每行一筆
                    </label>
                    <textarea
                      id="txt-uris"
                      class="form-control mono"
                      rows="3"
                      placeholder="https://open.spotify.com/track/3z8h0TU7ReDPLIbEnYhWZb"
                    ></textarea>
                  </div>
                  <div class="col-md-auto d-flex align-items-end gap-2">
                    <button id="btn-add" class="btn btn-primary">加入到此清單</button>
                    <button id="btn-remove" class="btn btn-danger">自此清單移除</button>
                  </div>
                </div>
              </div>

              <table id="pl-table" class="table table-striped table-bordered align-middle w-100">
                <thead class="table-light">
                  <tr>
                    <th style="width: 32px">
                      <input type="checkbox" id="pl-select-all" />
                    </th>
                    <th>名稱</th>
                    <th>藝人</th>
                    <th>專輯</th>
                    <th>發行日期</th>
                    <th style="width: 160px">ID</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </section>

        <!-- 右半：已按讚 -->
        <section id="panel-liked" class="panel">
          <div class="card h-100">
            <div class="card-body">
              <div class="d-flex align-items-center mb-2">
                <div class="me-auto fw-bold">已按讚的歌曲</div>
                <button id="btn-load-liked" class="btn btn-outline-secondary btn-sm">
                  載入
                </button>
              </div>

              <div class="mb-3">
                <div class="row g-2">
                  <div class="col-md">
                    <label class="form-label">選擇目標播放清單</label>
                    <select id="sel-liked-target-pl" class="form-select">
                      <!-- 由程式動態填入播放清單 -->
                    </select>
                  </div>
                  <div class="col-md-auto d-flex align-items-end gap-2">
                    <button id="btn-like" class="btn btn-primary">加入到播放清單</button>
                    <button id="btn-unlike" class="btn btn-danger">從已按讚移除</button>
                  </div>
                </div>
              </div>

              <table id="liked-table" class="table table-striped table-bordered align-middle w-100">
                <thead class="table-light">
                  <tr>
                    <th style="width: 32px">
                      <input type="checkbox" id="liked-select-all" />
                    </th>
                    <th>名稱</th>
                    <th>藝人</th>
                    <th>專輯</th>
                    <th>發行日期</th>
                    <th style="width: 160px">ID</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>

      <div id="status" class="small text-muted mt-2">狀態：就緒</div>
    </div>

    <!-- jQuery（DataTables 需要） -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5.0.2 JS（bundle, 含 Popper） -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables 核心 + Bootstrap5 插件 -->
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <!-- App modules（順序很重要） -->
    <script src="/static/js/config.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/storage.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/dom.js"></script>
    <script src="/static/js/render.js"></script>
    <script src="/static/js/tables.js"></script>

    <!-- Split.js（處理三面板拖曳） -->
    <script src="https://unpkg.com/split.js/dist/split.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.noStyle.js"></script>
    <script src="/static/js/aggrid.demo.js"></script>


    <!-- Controller 與啟動 -->
    <script src="/static/js/controller.js"></script>
    <script src="/static/js/main.js"></script>


  </body>
</html>
