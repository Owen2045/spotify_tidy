<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Spotify 本機工具</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { padding: 16px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .small { font-size: 12px; }
    textarea { font-size: 12px; }
    .table-fixed { table-layout: fixed; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="d-flex align-items-center mb-3">
      <h3 class="me-auto">Spotify 本機工具</h3>
      <button id="btn-login" class="btn btn-success">登入 Spotify</button>
    </div>

    <div class="row g-3">
      <div class="col-3">
        <div class="d-flex align-items-center mb-2">
          <h5 class="me-auto">播放清單</h5>
          <button id="btn-refresh-pl" class="btn btn-outline-secondary btn-sm">刷新</button>
        </div>
        <ul id="pl-list" class="list-group small"></ul>
      </div>

      <div class="col-9">
        <ul class="nav nav-tabs">
          <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-pl">選取的播放清單</a></li>
          <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-liked">已按讚</a></li>
        </ul>

        <div class="tab-content border border-top-0 rounded-bottom p-2">
          <div class="tab-pane fade show active" id="tab-pl">
            <div class="d-flex align-items-center mb-2">
              <div id="pl-title" class="me-auto fw-bold">尚未選取</div>
              <button id="btn-reload-pl-tracks" class="btn btn-outline-secondary btn-sm">重載曲目</button>
            </div>
            <div class="mb-2">
              <label class="form-label">輸入要新增或移除的 Track 支援 URL 或 URI 或 ID 多筆每行一個</label>
              <textarea id="txt-uris" class="form-control mono" rows="3" placeholder="https://open.spotify.com/track/3z8h0TU7ReDPLIbEnYhWZb"></textarea>
              <div class="mt-2 d-flex gap-2">
                <button id="btn-add" class="btn btn-primary">加入到此清單</button>
                <button id="btn-remove" class="btn btn-danger">自此清單移除</button>
              </div>
            </div>
            <div class="table-responsive">
              <table class="table table-striped table-sm align-middle table-fixed">
                <thead><tr><th style="width:35%">名稱</th><th style="width:35%">藝人</th><th style="width:20%">專輯</th><th style="width:10%">ID</th></tr></thead>
                <tbody id="pl-tracks"></tbody>
              </table>
            </div>
          </div>

          <div class="tab-pane fade" id="tab-liked">
            <div class="d-flex align-items-center mb-2">
              <div class="me-auto fw-bold">已按讚的歌曲</div>
              <button id="btn-load-liked" class="btn btn-outline-secondary btn-sm">載入</button>
            </div>
            <div class="mb-2">
              <label class="form-label">輸入要加入或移除的 Track 支援 URL 或 URI 或 ID 多筆每行一個</label>
              <textarea id="txt-liked" class="form-control mono" rows="3"></textarea>
              <div class="mt-2 d-flex gap-2">
                <button id="btn-like" class="btn btn-primary">加入到已按讚</button>
                <button id="btn-unlike" class="btn btn-danger">從已按讚移除</button>
              </div>
            </div>
            <div class="table-responsive">
              <table class="table table-striped table-sm align-middle table-fixed">
                <thead><tr><th style="width:40%">名稱</th><th style="width:40%">藝人</th><th style="width:20%">ID</th></tr></thead>
                <tbody id="liked-tracks"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="small text-muted mt-2" id="status">狀態 就緒</div>
      </div>
    </div>
  </div>

  <script>

		let likedCache = null;
		const LIKED_STORAGE_KEY = 'likedSongsCacheV1';

		function renderLiked(rows) {
			const tbody = document.querySelector('#liked-tracks');
			tbody.innerHTML = '';
			for (const r of rows) {
				const tr = document.createElement('tr');
				tr.innerHTML = `<td>${r.name}</td><td>${r.artists}</td><td class="mono small">${r.id}</td>`;
				tbody.appendChild(tr);
			}
			document.querySelector('#status').textContent = '狀態 已按讚曲目數 ' + rows.length;
		}

		function loadLikedCacheFromStorage() {
			try {
				const raw = localStorage.getItem(LIKED_STORAGE_KEY);
				if (!raw) return null;
				const data = JSON.parse(raw);
				if (!Array.isArray(data)) return null;
				return data;
			} catch {
				return null;
			}
		}

		function saveLikedCacheToStorage(rows) {
			try {
				localStorage.setItem(LIKED_STORAGE_KEY, JSON.stringify(rows || []));
			} catch {}
		}

    const S = (sel) => document.querySelector(sel);
    const status = (msg) => S('#status').textContent = '狀態 ' + msg;

    const toIdOrUri = (s) => {
      s = s.trim();
      if (!s) return '';
      if (s.startsWith('spotify:track:')) return s;
      const m = s.match(/open\.spotify\.com\/track\/([A-Za-z0-9]+)/);
      if (m) return m[1];
      return s;
    };

    let currentPid = null;

    async function api(path, opts = {}) {
      const r = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
      if (!r.ok) {
        if (r.status === 401) { return { unauthorized: true }; }
        const t = await r.text();
        throw new Error(t || r.statusText);
      }
      return await r.json();
    }

    async function ensureLogin() {
      const me = await api('/api/me');
      if (me && !me.unauthorized) return true;
      const { auth_url } = await api('/login');
      window.open(auth_url, '_blank');
      status('已開啟授權頁面 完成後回到本頁並重新整理或繼續操作');
      return false;
    }

    async function loadPlaylists() {
      status('載入播放清單');
      const ok = await ensureLogin(); if (!ok) return;
      const data = await api('/api/playlists');
      S('#pl-list').innerHTML = '';
      for (const p of data) {
        const li = document.createElement('li');
        li.className = 'list-group-item list-group-item-action';
        li.textContent = p.name;
        li.onclick = () => selectPlaylist(p.name, p.id);
        S('#pl-list').appendChild(li);
      }
      status('載入完成 共 ' + data.length + ' 個清單');
    }

    async function selectPlaylist(name, pid) {
      currentPid = pid;
      S('#pl-title').textContent = '《' + name + '》';
      await reloadPlaylistTracks();
    }

    async function reloadPlaylistTracks() {
      if (!currentPid) { status('尚未選取播放清單'); return; }
      status('載入曲目');
      const rows = await api(`/api/playlist/${currentPid}/tracks`);
      const tbody = S('#pl-tracks'); tbody.innerHTML = '';
      for (const r of rows) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.name}</td><td>${r.artists}</td><td>${r.album}</td><td class="mono small">${r.id}</td>`;
        tbody.appendChild(tr);
      }
      status('曲目數 ' + rows.length);
    }

    function getLines(id) {
      return S(id).value.split('\n').map(x => toIdOrUri(x)).filter(x => !!x);
    }

    async function addToPlaylist() {
      if (!currentPid) { alert('請先選取播放清單'); return; }
      const uris = getLines('#txt-uris');
      if (uris.length === 0) { alert('請至少輸入一首'); return; }
      await api(`/api/playlist/${currentPid}/add`, { method: 'POST', body: JSON.stringify({ uris }) });
      await reloadPlaylistTracks();
      alert('已新增完成');
    }

    async function removeFromPlaylist() {
      if (!currentPid) { alert('請先選取播放清單'); return; }
      const uris = getLines('#txt-uris');
      if (uris.length === 0) { alert('請至少輸入一首'); return; }
      await api(`/api/playlist/${currentPid}/remove`, { method: 'POST', body: JSON.stringify({ uris }) });
      await reloadPlaylistTracks();
      alert('已移除完成');
    }

		async function loadLiked() {
			const cached = likedCache || loadLikedCacheFromStorage();
			if (cached && Array.isArray(cached) && cached.length >= 0) {
				likedCache = cached;
				renderLiked(likedCache);
				return;
			}

			const ok = await ensureLogin(); if (!ok) return;
			document.querySelector('#status').textContent = '狀態 載入已按讚';
			const rows = await api('/api/liked');
			likedCache = rows;
			saveLikedCacheToStorage(likedCache);
			renderLiked(likedCache);
		}


    async function likeTracks() {
      const ids = getLines('#txt-liked');
      if (ids.length === 0) { alert('請至少輸入一首'); return; }
      await api('/api/liked/add', { method: 'POST', body: JSON.stringify({ ids }) });
      await loadLiked();
      alert('已加入到已按讚');
    }

    async function unlikeTracks() {
      const ids = getLines('#txt-liked');
      if (ids.length === 0) { alert('請至少輸入一首'); return; }
      await api('/api/liked/remove', { method: 'POST', body: JSON.stringify({ ids }) });
      await loadLiked();
      alert('已從已按讚移除');
    }

    document.getElementById('btn-login').onclick = ensureLogin;
    document.getElementById('btn-refresh-pl').onclick = loadPlaylists;
    document.getElementById('btn-reload-pl-tracks').onclick = reloadPlaylistTracks;
    document.getElementById('btn-add').onclick = addToPlaylist;
    document.getElementById('btn-remove').onclick = removeFromPlaylist;

    document.getElementById('btn-load-liked').onclick = loadLiked;
    document.getElementById('btn-like').onclick = likeTracks;
    document.getElementById('btn-unlike').onclick = unlikeTracks;

    loadPlaylists().catch(e => status('錯誤 ' + e.message));
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
