services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: spotify_frontend_dev
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost
    command: >
      sh -c "if [ ! -d 'node_modules' ] && [ -f 'package.json' ]; then npm install; fi && npm run dev -- -H 0.0.0.0"
    restart: unless-stopped
    networks:
      - dev-network

  nginx:
    image: nginx:alpine
    container_name: spotify_nginx_mac
    ports:
      - "80:80"
    volumes:
      - ./nginx.mac.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth
      - spotify
      - nlp
    restart: unless-stopped
    networks:
      - dev-network

  spotify:
    build:
      context: ../services/spotify
      dockerfile: Dockerfile
    container_name: spotify_service_dev
    ports:
      - "8002:8002"
    volumes:
      - ../services/spotify:/app
      - ${LOG_PATH}:/logs
    env_file:
      - .env.dev
    environment:
      - AUTH_SERVICE_URL=http://auth:8001
      - FRONTEND_URL=http://localhost
    depends_on:
      - auth
    command: >
      sh -c "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi && uvicorn main:app --host 0.0.0.0 --port 8002 --reload"
    restart: unless-stopped
    networks:
      - dev-network

  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    container_name: spotify_auth_dev
    ports:
      - "8001:8001"
    volumes:
      - ../services/auth:/app
      - ${LOG_PATH}:/logs
    env_file:
      - .env.dev
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - FRONTEND_URL=http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8001 --reload"
    restart: unless-stopped
    networks:
      - dev-network

  redis:
    image: redis:alpine
    container_name: spotify_redis_dev
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - dev-network

  nlp:
    build:
      context: ../services/nlp
      dockerfile: Dockerfile
    container_name: spotify_nlp_dev
    ports:
      - "8003:8003"
    volumes:
      - ../services/nlp:/app
      - ${LOG_PATH}:/logs
    env_file:
      - .env.dev
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AUTH_SERVICE_URL=http://auth:8001
      - REDIS_HOST=redis
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi && uvicorn main:app --host 0.0.0.0 --port 8003 --reload"
    restart: unless-stopped
    networks:
      - dev-network

  nlp-worker:
    build:
      context: ../services/nlp
      dockerfile: Dockerfile
    container_name: spotify_nlp_worker
    volumes:
      - ../services/nlp:/app
      - ${LOG_PATH}:/logs
    env_file:
      - .env.dev
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AUTH_SERVICE_URL=http://auth:8001
      - REDIS_HOST=redis
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi && arq worker.WorkerSettings"
    restart: unless-stopped
    networks:
      - dev-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: spotify_postgres_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  dev-network:
    driver: bridge
