services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: spotify_frontend_dev
    ports:
      - "3000:3000"
    volumes:
      # 將本機的 frontend 資料夾原始碼掛載進去，支援 Hot Reload
      - ../frontend:/app
      # 保護容器內的 node_modules 不被本機覆蓋 (這在雙軌制中極度重要)
      - /app/node_modules
    environment:
      # 告訴 Next.js 前端，API Server 的真實位置 (實體部署請換成對應 IP)
      - NEXT_PUBLIC_API_BASE=http://localhost
    # 保護機制：若掛載後發現毫無套件，先裝套件再跑伺服器 (支援 0.0.0.0)
    command: >
      sh -c "if [ ! -d 'node_modules' ] && [ -f 'package.json' ]; then npm install; fi && npm run dev -- -H 0.0.0.0"
    restart: unless-stopped
    networks:
      - dev-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: spotify_backend_dev
    ports:
      - "8000:8000"
    volumes:
      # 將本機的 backend 資料夾原始碼掛載進去，支援 uvicorn --reload
      - ../backend:/app
    env_file:
      - .env.dev
    environment:
      # 告訴 FastAPI 後端，允許來自遠端機器的前端存取 (CORS)
      - BACKEND_CORS_ORIGINS=http://localhost:3000
    # 保護機制：確保啟動前 requirements有安裝，順便執行 hot-reload 啟動
    command: >
      sh -c "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped
    networks:
      - dev-network

  traefik:
    image: traefik:v3.0
    container_name: spotify_traefik_dev
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=dev-network"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dev-network
    restart: unless-stopped

  spotify:
    build:
      context: ../services/spotify
      dockerfile: Dockerfile
    container_name: spotify_service_dev
    ports:
      - "8002:8002"
    volumes:
      - ../services/spotify:/app
    env_file:
      - .env.dev
    environment:
      - AUTH_SERVICE_URL=http://auth:8001
      - FRONTEND_URL=http://localhost
    depends_on:
      - auth
    command: >
      sh -c "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi && uvicorn main:app --host 0.0.0.0 --port 8002 --reload"
    restart: unless-stopped
    networks:
      - dev-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.spotify.rule=PathPrefix(`/spotify`)"
      - "traefik.http.routers.spotify.entrypoints=web"
      - "traefik.http.services.spotify.loadbalancer.server.port=8002"

  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    container_name: spotify_auth_dev
    ports:
      - "8001:8001"
    volumes:
      - ../services/auth:/app
    env_file:
      - .env.dev
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - FRONTEND_URL=http://localhost
    depends_on:
      - postgres
    command: >
      sh -c "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi && uvicorn main:app --host 0.0.0.0 --port 8001 --reload"
    restart: unless-stopped
    networks:
      - dev-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.services.auth.loadbalancer.server.port=8001"

  postgres:
    image: postgres:16-alpine
    container_name: spotify_postgres_dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - dev-network
    restart: unless-stopped

networks:
  dev-network:
    driver: bridge

volumes:
  postgres_data:
